version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: pixel_pay_db
    environment:
      POSTGRES_DB: pixel_pay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pixel_pay_api
    ports:
      - "3001:3001"
    env_file:
      - ./apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: pixel_pay_web
    ports:
      - "5173:5173"
    depends_on:
      - api

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: pixel_pay_admin
    ports:
      - "5174:5174"
    depends_on:
      - api

volumes:
  pgdata:
